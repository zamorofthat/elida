backend: "https://api.anthropic.com"
control:
    auth:
        enabled: true
        api_key: "elida-demo-key-2026"
policy:
    enabled: true
    mode: enforce
    preset: standard
    risk_ladder:
        enabled: true
        warn_score: 5
        throttle_score: 15
        block_score: 30
        terminate_score: 50
    trust:
        trusted_tags:
            - "system-reminder"
        allowlisted_tools:
            - "Read"
            - "Glob"
            - "Grep"
            - "Edit"
            - "Write"
            - "Agent"
            - "Skill"
            - "NotebookEdit"
            - "TaskCreate"
            - "TaskUpdate"
            - "TaskList"
            - "TaskGet"
failover:
    enabled: false
    max_retries: 2
    auto_select: true
capture:
    mode: flagged_only
    max_capture_size: 10000
    max_per_session: 100
telemetry:
    enabled: true
    exporter: otlp
    endpoint: "default.main.affectionate-rust-3izd4n6.cribl.cloud:4317"
    service_name: elida
    insecure: false
    capture_content: "flagged"
    max_body_size: 4096
