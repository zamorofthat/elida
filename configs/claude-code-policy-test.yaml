# ELIDA config for testing Claude Code with standard policy enforcement
# Client provides their own Anthropic API key

listen: ":8080"
backend: "https://api.anthropic.com"

control:
  listen: ":9090"
  enabled: true

session:
  timeout: 30m
  generate_if_missing: true

# Standard policy in ENFORCE mode
policy:
  enabled: true
  mode: enforce
  preset: standard
  capture_flagged: true

  circuit_breaker:
    enabled: true
    tokens_per_minute: 100000
    max_tokens_per_session: 500000
    max_tool_calls: 500
    max_tool_fanout: 50

  risk_ladder:
    enabled: true
    thresholds:
      - score: 10
        action: warn
      - score: 25
        action: throttle
        throttle_rate: 20
      - score: 50
        action: block

storage:
  enabled: true
  path: "data/claude-code-test.db"
  capture_mode: "flagged_only"

logging:
  level: info

telemetry:
  enabled: true
  exporter: otlp
  endpoint: "default.main.affectionate-rust-3izd4n6.cribl.cloud:4317"
  service_name: elida
  insecure: false
