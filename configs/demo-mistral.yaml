# ELIDA Demo - Keyless clients, Mistral backend
listen: ":8080"

backends:
  mistral:
    url: "https://api.mistral.ai"
    type: "openai"
    default: true
    api_key: "LtYYv5sJ3D0yndmJYFOd4MJGIUXSmCoN"

control:
  listen: ":9090"
  enabled: true

session:
  timeout: 30m
  generate_if_missing: true

policy:
  enabled: true
  mode: enforce
  preset: standard
  capture_flagged: true
  circuit_breaker:
    enabled: true
    tokens_per_minute: 50000
    max_tokens_per_session: 200000
    max_tool_calls: 100

storage:
  enabled: true
  path: "data/demo-mistral.db"
  capture_mode: "flagged_only"

logging:
  level: info
