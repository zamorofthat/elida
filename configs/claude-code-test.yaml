# ELIDA config for testing Claude Code compatibility
# Tests if standard policy is too strict for normal coding workflows

listen: ":8080"
backend: "https://api.anthropic.com"

control:
  listen: ":9090"
  enabled: true

session:
  timeout: 30m
  header: "X-Session-ID"
  generate_if_missing: true

# Policy: enforce mode with standard preset
policy:
  enabled: true
  mode: enforce  # Real enforcement to test compatibility
  preset: standard
  capture_flagged: true

  # Circuit breaker - generous limits for coding
  circuit_breaker:
    enabled: true
    tokens_per_minute: 100000
    max_tokens_per_session: 500000
    max_tool_calls: 500
    max_tool_fanout: 50

storage:
  enabled: true
  path: "data/claude-code-test.db"
  capture_mode: "flagged_only"

logging:
  level: info
  format: json
