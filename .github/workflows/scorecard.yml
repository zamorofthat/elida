name: OpenSSF Scorecard

on:
  # Run on pushes to main for scoring
  push:
    branches: [main]
  # Run weekly
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 6am UTC
  # Allow manual trigger
  workflow_dispatch:

permissions: read-all

jobs:
  analysis:
    name: Scorecard Analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write  # Upload SARIF
      id-token: write         # Publish results
      contents: read
      actions: read

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      # Note: scorecard-action requires tag reference for publish_results verification
      - name: Run Scorecard
        uses: ossf/scorecard-action@v2.4.0
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@f35333b910470a5408cb081b68f0701254a7d27b # v3.28.18
        with:
          sarif_file: results.sarif
