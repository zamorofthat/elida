name: SLSA Provenance

on:
  workflow_dispatch:  # Manual trigger only — replaced by release.yml (GoReleaser + SLSA)

permissions: {}

jobs:
  checksums:
    name: Download Release Checksums
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      hashes: ${{ steps.hash.outputs.hashes }}

    steps:
      - name: Download checksums from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download "${{ github.event.release.tag_name }}" \
            --repo "${{ github.repository }}" \
            --pattern "checksums.txt" \
            --dir .

      - name: Base64 encode checksums
        id: hash
        run: |
          echo "hashes=$(base64 -w0 checksums.txt)" >> "$GITHUB_OUTPUT"

  provenance:
    name: Generate SLSA Provenance
    needs: checksums
    permissions:
      actions: read
      id-token: write
      contents: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0
    with:
      base64-subjects: ${{ needs.checksums.outputs.hashes }}
      upload-assets: ${{ github.event_name == 'release' }}
