name: SLSA Provenance

on:
  release:
    types: [created]

permissions: read-all

jobs:
  build:
    name: Build Binaries
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      hashes: ${{ steps.hash.outputs.hashes }}

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: go.mod

      - name: Build all binaries
        run: |
          GOOS=linux GOARCH=amd64 go build -trimpath -ldflags="-s -w" -o elida-linux-amd64 ./cmd/elida
          GOOS=linux GOARCH=arm64 go build -trimpath -ldflags="-s -w" -o elida-linux-arm64 ./cmd/elida
          GOOS=darwin GOARCH=amd64 go build -trimpath -ldflags="-s -w" -o elida-darwin-amd64 ./cmd/elida
          GOOS=darwin GOARCH=arm64 go build -trimpath -ldflags="-s -w" -o elida-darwin-arm64 ./cmd/elida
          GOOS=windows GOARCH=amd64 go build -trimpath -ldflags="-s -w" -o elida-windows-amd64.exe ./cmd/elida

      - name: Generate hashes
        id: hash
        run: |
          sha256sum elida-* > checksums.txt
          cat checksums.txt
          echo "hashes=$(sha256sum elida-* | base64 -w0)" >> "$GITHUB_OUTPUT"

      - name: Upload artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: binaries
          path: elida-*
          if-no-files-found: error
          retention-days: 5

  provenance:
    name: Generate SLSA Provenance
    needs: build
    permissions:
      actions: read
      id-token: write
      contents: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0
    with:
      base64-subjects: ${{ needs.build.outputs.hashes }}
      upload-assets: true

  release:
    name: Upload Release Assets
    runs-on: ubuntu-latest
    needs: [build, provenance]
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: binaries
          path: artifacts

      - name: Upload to release
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631 # v2.2.2
        with:
          files: artifacts/*
