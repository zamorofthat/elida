name: SLSA Provenance

on:
  release:
    types: [created]

permissions: read-all

jobs:
  build:
    name: Build Binaries
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      hashes: ${{ steps.hash.outputs.hashes }}

    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
          - os: linux
            arch: arm64
          - os: darwin
            arch: amd64
          - os: darwin
            arch: arm64
          - os: windows
            arch: amd64

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: go.mod

      - name: Build binary
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
        run: |
          EXT=""
          if [ "$GOOS" = "windows" ]; then EXT=".exe"; fi
          go build -trimpath -ldflags="-s -w" -o elida-${{ matrix.os }}-${{ matrix.arch }}${EXT} ./cmd/elida

      - name: Generate hash
        id: hash
        run: |
          ARTIFACT="elida-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.os == 'windows' && '.exe' || '' }}"
          HASH=$(sha256sum "$ARTIFACT" | base64 -w0)
          echo "hashes=$HASH" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: elida-${{ matrix.os }}-${{ matrix.arch }}
          path: elida-${{ matrix.os }}-${{ matrix.arch }}*
          if-no-files-found: error
          retention-days: 5

  combine-hashes:
    name: Combine Hashes
    runs-on: ubuntu-latest
    needs: build
    outputs:
      hashes: ${{ steps.combine.outputs.hashes }}
    steps:
      - name: Combine hashes
        id: combine
        env:
          HASHES: ${{ toJSON(needs.build.outputs.hashes) }}
        run: |
          echo "$HASHES" | jq -r 'to_entries | map(.value) | join("")' | base64 -d > hashes.txt
          COMBINED=$(cat hashes.txt | base64 -w0)
          echo "hashes=$COMBINED" >> "$GITHUB_OUTPUT"

  provenance:
    name: Generate SLSA Provenance
    needs: [build, combine-hashes]
    permissions:
      actions: read
      id-token: write
      contents: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0
    with:
      base64-subjects: ${{ needs.combine-hashes.outputs.hashes }}
      upload-assets: true

  release:
    name: Upload Release Assets
    runs-on: ubuntu-latest
    needs: [build, provenance]
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          path: artifacts
          merge-multiple: true

      - name: Upload to release
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631 # v2.2.2
        with:
          files: artifacts/*
