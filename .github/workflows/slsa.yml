name: SLSA Provenance

on:
  release:
    types: [created]
  workflow_dispatch:  # Manual trigger for testing

permissions: {}

jobs:
  build:
    name: Build All Binaries
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      hashes: ${{ steps.hash.outputs.hashes }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Build all binaries
        run: |
          # Build all platform variants
          GOOS=linux   GOARCH=amd64 go build -trimpath -ldflags="-s -w" -o elida-linux-amd64 ./cmd/elida
          GOOS=linux   GOARCH=arm64 go build -trimpath -ldflags="-s -w" -o elida-linux-arm64 ./cmd/elida
          GOOS=darwin  GOARCH=amd64 go build -trimpath -ldflags="-s -w" -o elida-darwin-amd64 ./cmd/elida
          GOOS=darwin  GOARCH=arm64 go build -trimpath -ldflags="-s -w" -o elida-darwin-arm64 ./cmd/elida
          GOOS=windows GOARCH=amd64 go build -trimpath -ldflags="-s -w" -o elida-windows-amd64.exe ./cmd/elida

      - name: Generate hashes
        id: hash
        run: |
          # Generate SHA256 hashes for all binaries in SLSA format
          sha256sum elida-* > checksums.txt
          cat checksums.txt
          # Base64 encode for SLSA provenance
          echo "hashes=$(cat checksums.txt | base64 -w0)" >> "$GITHUB_OUTPUT"

      - name: Upload artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: binaries
          path: elida-*
          if-no-files-found: error
          retention-days: 5

  provenance:
    name: Generate SLSA Provenance
    needs: build
    permissions:
      actions: read
      id-token: write
      contents: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0
    with:
      base64-subjects: ${{ needs.build.outputs.hashes }}
      upload-assets: ${{ github.event_name == 'release' }}

  release:
    name: Upload Release Assets
    runs-on: ubuntu-latest
    needs: [build, provenance]
    if: github.event_name == 'release'
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: binaries
          path: artifacts

      - name: Upload to release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          files: artifacts/*
