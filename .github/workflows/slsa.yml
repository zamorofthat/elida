name: SLSA Provenance

on:
  release:
    types: [created]

permissions: read-all

jobs:
  build:
    name: Build Binaries
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      hashes: ${{ steps.hash.outputs.hashes }}

    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
          - os: linux
            arch: arm64
          - os: darwin
            arch: amd64
          - os: darwin
            arch: arm64
          - os: windows
            arch: amd64

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod

      - name: Build binary
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
        run: |
          EXT=""
          if [ "$GOOS" = "windows" ]; then EXT=".exe"; fi
          go build -trimpath -ldflags="-s -w" -o elida-${{ matrix.os }}-${{ matrix.arch }}${EXT} ./cmd/elida

      - name: Generate hash
        id: hash
        run: |
          ARTIFACT="elida-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.os == 'windows' && '.exe' || '' }}"
          HASH=$(sha256sum "$ARTIFACT" | base64 -w0)
          echo "hashes=$HASH" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: elida-${{ matrix.os }}-${{ matrix.arch }}
          path: elida-${{ matrix.os }}-${{ matrix.arch }}*
          if-no-files-found: error
          retention-days: 5

  combine-hashes:
    name: Combine Hashes
    runs-on: ubuntu-latest
    needs: build
    outputs:
      hashes: ${{ steps.combine.outputs.hashes }}
    steps:
      - name: Combine hashes
        id: combine
        env:
          HASHES: ${{ toJSON(needs.build.outputs.hashes) }}
        run: |
          echo "$HASHES" | jq -r 'to_entries | map(.value) | join("")' | base64 -d > hashes.txt
          COMBINED=$(cat hashes.txt | base64 -w0)
          echo "hashes=$COMBINED" >> "$GITHUB_OUTPUT"

  provenance:
    name: Generate SLSA Provenance
    needs: [build, combine-hashes]
    permissions:
      actions: read
      id-token: write
      contents: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0
    with:
      base64-subjects: ${{ needs.combine-hashes.outputs.hashes }}
      upload-assets: true

  release:
    name: Upload Release Assets
    runs-on: ubuntu-latest
    needs: [build, provenance]
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          path: artifacts
          merge-multiple: true

      - name: Upload to release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2.5.0
        with:
          files: artifacts/*
