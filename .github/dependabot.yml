version: 2
updates:
  # Go modules
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: "deps"
    labels:
      - dependencies
      - go

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: "ci"
    labels:
      - dependencies
      - ci

  # Docker base images
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: "docker"
    labels:
      - dependencies
      - docker

  # npm (dashboard)
  - package-ecosystem: npm
    directory: /web
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: "deps(web)"
    labels:
      - dependencies
      - frontend
