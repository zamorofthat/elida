version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck  # includes gosimple and staticcheck
    - unused
    - misspell
    - unconvert
    - unparam
    - bodyclose
    - noctx

  settings:
    errcheck:
      check-type-assertions: true
    govet:
      enable-all: true
      disable:
        - fieldalignment
    misspell:
      locale: US

  exclusions:
    rules:
      # Ignore long lines in tests
      - path: _test\.go
        linters:
          - lll
      # Ignore error returns in tests for deferred closes
      - path: _test\.go
        text: "Error return value of .*(Close|Remove)"
        linters:
          - errcheck
      # TODO: Add context to storage layer DB calls
      - path: internal/storage/
        linters:
          - noctx

formatters:
  enable:
    - gofmt
    - goimports

  settings:
    goimports:
      local-prefixes:
        - elida

