version: 2

project_name: elida

before:
  hooks:
    - go mod tidy

builds:
  - main: ./cmd/elida
    binary: elida
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.Version={{.Version}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    files:
      - README.md
      - LICENSE
      - configs/elida.yaml
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt
  algorithm: sha256

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^Merge pull request"
      - "^Merge branch"

nfpms:
  - package_name: elida
    vendor: zamorofthat
    homepage: https://github.com/zamorofthat/elida
    maintainer: Aaron Zamora <aaron@elida.com>
    description: AI proxy with session tracking, policy engine, and observability
    license: apache-2.0
    formats:
      - deb
      - rpm
    contents:
      - src: configs/elida.yaml
        dst: /etc/elida/elida.yaml
        type: config

